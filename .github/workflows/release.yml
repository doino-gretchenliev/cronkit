name: release

# Build + push a multi-arch image to Docker Hub when a GitHub Release is
# published. Image: docker.io/<DOCKERHUB_USERNAME>/cronkit
# Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (see README/setup).

on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Normalize the namespace: Docker refs must be lowercase with no
      # whitespace, regardless of how the secret was entered.
      - id: img
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ns=$(printf '%s' "$DH_USER" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
          echo "image=${ns}/cronkit" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
